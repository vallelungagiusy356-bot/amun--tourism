<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amunì Tourism</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ============================
         NAVBAR / DASHBOARD
         ============================ -->
    <header class="dashboard">
        <ul class="nav-main">
            <li>Home</li>

            <li class="has-dropdown">Esperienze
                <ul class="dropdown">
                    <li>I Segreti del Castello</li>

                    <li class="has-submenu">Gastronomia
                        <ul class="sub-dropdown">
                            <li>Sapori Locali</li>
                        </ul>
                    </li>
                </ul>
            </li>

            <li>Chi Siamo</li>
            <li>Contatti</li>
        </ul>
    </header>

    <!-- ============================
         HERO: AVATAR + CHAT
         ============================ -->
    <section class="hero">

        <!-- AVATAR -->
        <div class="avatar-placeholder">
            <img src="castellana_clean.png" class="floating-img" alt="Castellana di Caccamo">
        </div>

        <!-- CHAT -->
        <div class="chat-glass">
            <div class="chat-controls">

                <div class="message">
                    Benvenuto, viandante. Le pietre di Caccamo sussurrano storie di cavalieri e nobili...
                </div>

                <div class="message">
                    Ah, la nostra terra è generosa! Olio dorato e dolci mandorle vi delizieranno...
                </div>

                <div class="input-wrapper">
                    <input type="text" placeholder="Scrivi un messaggio...">
                    <button class="mic-btn">🎤</button>
                </div>

                <div class="action-buttons">
                    <button class="btn-gold">Esplora con la Castellana</button>
                    <button class="btn-outline">Invoca l’app AR</button>
                </div>

            </div>
        </div>

    </section>

    <!-- ============================
         FOOTER
         ============================ -->
    <footer>
        © Amunì Tourism
    </footer>

</body>
</html>
<link rel="stylesheet" href="css/style.css">
