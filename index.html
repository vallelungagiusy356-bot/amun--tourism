<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amunì Tourism</title>
    <link rel="stylesheet" href="css_style2.css">
</head>
<body>

    <!-- LIVELLO 0 — SFONDO -->
    <div class="scene-background"></div>

    <!-- LIVELLO 1 — DASHBOARD -->
    <header class="dashboard">
        <div class="logo-title">Amunì Tourism</div>
        <ul class="nav-main">
            <li>Home</li>
            <li>Esperienze</li>
            <li>Chi Siamo</li>
            <li>Contatti</li>
        </ul>
    </header>

    <!-- LIVELLO 2 — SCENA (CASTELLANA + CASTELLO) -->
    <div class="scene-layer">
        <img src="castello-clean.png" class="img-castello" alt="Castello di Caccamo">
        <img src="castellana_clean.png" class="img-castellana" alt="Castellana di Caccamo">
    </div>

    <!-- LIVELLO 3 — CHAT -->
    <div class="chat-layer">
        <div class="chat-glass">

            <div class="chat-messages">
                <div class="message">
                    Benvenuto, viandante. Le pietre di Caccamo sussurrano storie di cavalieri e nobili...
                </div>
                <div class="message">
                    Ah, la nostra terra è generosa! Olio dorato e dolci mandorle vi delizieranno...
                </div>
            </div>

            <div class="chat-item-abito">
                <img src="abito_clean.png" class="img-abito" alt="Abito cerimoniale">
            </div>

            <div class="chat-input-row">
                <input type="text" placeholder="Scrivi un messaggio...">
                <button class="mic-btn">🎤</button>
            </div>

            <div class="chat-actions">
                <button class="btn-gold">Esplora con la Castellana</button>
                <button class="btn-outline">Invoca l’app AR</button>
            </div>

        </div>
    </div>

</body>
</html>
