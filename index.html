<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amunì Tourism - La Castellana</title>
    <link rel="stylesheet" href="css/style.css?v=25.0">
</head>
<body>

    <div class="sky-bg"></div>
    <div class="castle-bg"></div>
    <div class="dress-bg"></div>

    <div class="wrapper">
        <header>
            <div class="logo">AMUNÌ <span>TOURISM</span></div>
            <ul class="nav-links">
                <li>Home</li>
                <li>Esperienze</li>
                <li>Chi Siamo</li>
            </ul>
        </header>

        <main class="hero">
            <div class="avatar-box">
                <img src="castellana_clean.png" alt="La Castellana" class="main-avatar">
            </div>

            <div class="chat-box">
                <div class="glass-card">
                    <h2>Castellana di Caccamo</h2>
                    <p>Benvenuta nel mio regno. Cosa desideri scoprire oggi?</p>
                    
                    <div class="actions">
                        <button class="btn-gold">ESPLORA</button>
                        <button class="btn-outline">APP AR</button>
                    </div>

                    <div class="input-area">
                        <input type="text" placeholder="Scrivi alla Castellana...">
                        <span>🎤</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
