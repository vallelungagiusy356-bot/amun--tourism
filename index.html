<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amunì Tourism - La Castellana</title>
    <link rel="stylesheet" href="css/style.css?v=7.0">
</head>
<body>

    <div class="sky-fire"></div>
    <div class="castle-bg"></div>

    <div class="main-layout">
        <header>
            <div class="logo">AMUNÌ <span>TOURISM</span></div>
            <nav>
                <ul><li>Home</li><li>Esperienze</li><li>Chi Siamo</li><li>Contatti</li><li>IT/EN</li></ul>
            </nav>
        </header>

        <main>
            <div class="hero-character">
                <img src="castellana_clean.png" alt="Castellana">
                <div class="main-buttons">
                    <button class="btn-gold">ESPLORA CON LA CASTELLANA</button>
                    <button class="btn-gold">INVOCA L'APP AR</button>
                </div>
            </div>

            <div class="chat-glass-container">
                <div class="glass-window">
                    <div class="chat-messages">
                        <div class="msg-bot">
                            <p><strong>Castellana di Caccamo</strong></p>
                            <p>Benvenuta nel mio regno. Cosa desideri scoprire oggi?</p>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" placeholder="Scrivi un messaggio...">
                        <div class="mic-glow">🎤</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
