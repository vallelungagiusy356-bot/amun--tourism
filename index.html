<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amunì Tourism - La Castellana</title>
    <link rel="stylesheet" href="css/style.css?v=11.0">
</head>
<body>

    <div class="sky-background"></div>
    <div class="castle-background"></div>
    <div class="dress-background"></div>

    <div class="wrapper">
        <header>
            <nav>
                <div class="logo">AMUNÌ <span>TOURISM</span></div>
                <ul class="nav-links">
                    <li>Home</li>
                    <li>Esperienze</li>
                    <li>Chi Siamo</li>
                </ul>
            </nav>
        </header>

        <main class="hero">
            <div class="avatar-container">
                <img src="castellana_clean.png" alt="La Castellana" class="main-avatar">
            </div>

            <div class="glass-container">
                <div class="glass-screen">
                    <div class="chat-header">
                        <h2>Castellana di Caccamo</h2>
                        <p>Benvenuta nel mio regno. Cosa desideri scoprire oggi?</p>
                    </div>
                    
                    <div class="chat-actions">
                        <button class="btn-gold">ESPLORA CON LA CASTELLANA</button>
                        <button class="btn-outline">INVOCA L'APP AR</button>
                    </div>

                    <div class="chat-input">
                        <input type="text" placeholder="Scrivi alla Castellana...">
                        <span class="mic-icon">🎤</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
