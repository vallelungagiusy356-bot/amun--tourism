<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amunì Tourism - La Castellana</title>
    <link rel="stylesheet" href="css/style.css?v=6.0">
</head>
<body>

    <div class="sky-fire"></div>
    <div class="castle-silhouette"></div>

    <div class="main-wrapper">
        <header>
            <nav>
                <div class="logo">AMUNÌ <span>TOURISM</span></div>
                <ul class="nav-links">
                    <li>Home</li>
                    <li>Esperienze</li>
                    <li>Chi Siamo</li>
                </ul>
            </nav>
        </header>

        <main class="content">
            <div class="character-area">
                <img src="castellana_clean.png" alt="Castellana" class="hero-img">
            </div>

            <div class="glass-interface">
                <div class="glass-card">
                    <div class="card-text">
                        <h2>Castellana di Caccamo</h2>
                        <p>Benvenuta nel mio regno. Cosa desideri scoprire oggi?</p>
                    </div>
                    
                    <div class="card-buttons">
                        <button class="btn-gold">ESPLORA CON LA CASTELLANA</button>
                        <button class="btn-outline">INVOCA L'APP AR</button>
                    </div>

                    <div class="card-input">
                        <input type="text" placeholder="Scrivi un messaggio...">
                        <span class="mic">🎤</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
