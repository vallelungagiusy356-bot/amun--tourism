<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amuni Tourism - Caccamo</title>
    <link rel="stylesheet" href="css/style.css?v=3.0">
</head>
<body>
    
    <div class="sky-gradient"></div>    <div class="back-castle"></div>     <div class="back-dress"></div>      <div class="vignette-overlay"></div><div class="content-wrapper">
        <header>
            <nav>
                <div class="logo">Amunì <span>Tourism</span></div>
                <ul class="nav-menu">
                    <li>Home</li>
                    <li>Esperienze</li>
                    <li>Chi Siamo</li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="avatar-section">
                <img src="castellana_clean.png" alt="Castellana di Caccamo" class="castellana-img">
            </section>

            <section class="chat-window glass">
                <div id="chat-display">
                    <p class="bot-msg"><strong>Castellana di Caccamo</strong></p>
                    <p>Benvenuta nel mio regno. Cosa desideri scoprire oggi?</p>
                </div>
                <div class="buttons-area">
                    <button class="btn-gold">ESPLORA CON LA CASTELLANA</button>
                    <button class="btn-glass">INVOCA L'APP AR</button>
                </div>
                <div class="chat-input-area">
                    <input type="text" placeholder="Scrivi alla Castellana...">
                    <button class="mic-btn">🎤</button>
                </div>
            </section>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
