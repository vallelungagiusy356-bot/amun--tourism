<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amunì Tourism - Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- AUDIO EPICO -->
    <audio id="bg-music" loop>
        <source src="audio/more-epic-lorem-ipsum-by-ende-dot-app.mp3" type="audio/mpeg">
    </audio>

    <!-- SFONDO -->
    <div class="scene-background"></div>

    <!-- DASHBOARD MOBILE -->
    <header class="dashboard">
        <div class="logo-title">Amunì Tourism</div>
    </header>

    <!-- LAYOUT MOBILE -->
    <div class="mobile-layout">

        <!-- VIDEO CASTELLANA (VERSIONE WEBM TRASPARENTE) -->
        <div class="video-container">
            <video autoplay muted loop playsinline class="castellana-avatar">
                <source src="img/castellana_alpha.webm" type="video/webm">
            </video>
        </div>

        <!-- BOTTONI BAROCCHI -->
        <div class="buttons-grid">
            <div class="btn-barocco">Mangiare</div>
            <div class="btn-barocco">Dormire</div>
            <div class="btn-barocco">Trasporti</div>
        </div>

        <div class="buttons-row-2">
            <div class="btn-barocco">Eventi</div>
            <div class="btn-barocco">Monumenti</div>
        </div>

        <!-- BOTTONE CHAT WEB -->
        <a href="https://tuosito.it" class="btn-chat-web">
            💬 Parla con la Castellana sul sito web
        </a>

        <!-- SEZIONE AMUNI -->
        <div class="amuni-box">
            <div class="amuni-title">Il significato di Amunì</div>
            <div class="amuni-text">
                In Sicilia, “Amunì” non è solo un “andiamo”.  
                È un invito gentile, un sorriso che ti accompagna.  
                È la voce della nostra terra che ti dice:  
                muoviti, vivi, scopri, sogna.
            </div>
        </div>

    </div>

    <!-- SCRIPT: MUSICA PARTE AL PRIMO TOCCO -->
<script>
    const audio = document.getElementById("bg-music");
    audio.volume = 0.5; // volume iniziale

    let musicStarted = false;

    function startMusic() {
        if (!musicStarted) {
            audio.play().then(() => {
                musicStarted = true;
            }).catch(() => {
                // fallback per Safari
                setTimeout(() => {
                    audio.play();
                }, 200);
            });

            document.removeEventListener("touchstart", startMusic);
            document.removeEventListener("click", startMusic);
        }
    }

    // ascolta qualsiasi gesto dell'utente
    document.addEventListener("touchstart", startMusic, { once: true });
    document.addEventListener("click", startMusic, { once: true });
</script>

</body>
</html>
