<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amunì Tourism - Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SFONDO -->
    <div class="scene-background"></div>

    <!-- DASHBOARD MOBILE -->
    <header class="dashboard">
        <div class="logo-title">Amunì Tourism</div>
    </header>

    <!-- LAYOUT MOBILE -->
    <div class="mobile-layout">

        <!-- VIDEO CASTELLANA -->
        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/QYmlrOOQQ2M?autoplay=1&mute=1&loop=1&playlist=QYmlrOOQQ2M&controls=0&modestbranding=1&showinfo=0"
                frameborder="0"
                allow="autoplay; encrypted-media"
                allowfullscreen
                class="castellana-video">
            </iframe>
        </div>

        <!-- BOTTONI BAROCCHI -->
        <div class="buttons-grid">
            <div class="btn-barocco">Mangiare</div>
            <div class="btn-barocco">Dormire</div>
            <div class="btn-barocco">Trasporti</div>
        </div>

        <div class="buttons-row-2">
            <div class="btn-barocco">Eventi</div>
            <div class="btn-barocco">Monumenti</div>
        </div>

        <!-- BOTTONE CHAT WEB -->
        <a href="https://tuosito.it" class="btn-chat-web">
            💬 Parla con la Castellana sul sito web
        </a>

        <!-- SEZIONE AMUNI -->
        <div class="amuni-box">
            <div class="amuni-title">Il significato di Amunì</div>
            <div class="amuni-text">
                In Sicilia, “Amunì” non è solo un “andiamo”.  
                È un invito gentile, un sorriso che ti accompagna.  
                È la voce della nostra terra che ti dice:  
                muoviti, vivi, scopri, sogna.
            </div>
        </div>

    </div>

</body>
</html>
