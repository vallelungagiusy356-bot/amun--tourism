<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amunì Tourism - Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SFONDO -->
    <div class="scene-background"></div>

    <!-- DASHBOARD MOBILE -->
    <header class="dashboard">
        <div class="logo-title">Amunì Tourism</div>
    </header>

    <!-- LAYOUT MOBILE -->
    <div class="mobile-layout">

        <!-- CASTELLANA -->
        <div class="castellana-wrapper">
            <img src="img/castellana_clean.png" class="castellana-img" alt="Castellana di Caccamo">
        </div>

        <!-- CHAT MOBILE -->
        <div class="chat-box">
            <div class="chat-messages">
                <div class="message">
                    Benvenuto viandante, la storia di Caccamo ti attende...
                </div>
            </div>

            <div class="chat-input-row">
                <input type="text" placeholder="Scrivi un messaggio...">
                <button class="mic-btn">🎤</button>
            </div>

            <div class="chat-actions">
                <button class="btn-gold">Esplora</button>
                <button class="btn-outline">App AR</button>
            </div>
        </div>

    </div>

</body>
</html>
